# Save this file to: .github/workflows/snake.yml in your satyanarayana5403/satyanarayana5403 repo
#
# What it does: once a day (and any time you push, or you can trigger it manually
# from the Actions tab), it redraws your real contribution graph as a snake game
# and publishes the SVG to an "output" branch. The <picture> tag in README.md
# points at that branch, so the animation stays in sync with your actual activity.

name: generate animation

on:
  # runs automatically once a day
  schedule:
    - cron: "0 0 * * *"
  # lets you trigger it manually from the Actions tab
  workflow_dispatch:
  # regenerates whenever you push to your default branch
  push:
    branches:
      - main
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # publishes the svg files to a branch called "output" so the README
      # can reference them directly via raw.githubusercontent.com
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
